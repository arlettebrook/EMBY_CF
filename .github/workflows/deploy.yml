name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Inject BASE_DOMAIN into wrangler.toml
        run: sed -i 's/BASE_DOMAIN = "example.com"/BASE_DOMAIN = "${{ secrets.BASE_DOMAIN }}"/g' wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
          secrets: |
            ADMIN_PASSWORD
            CF_API_TOKEN
            CF_ZONE_ID
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}

      - name: Create D1 Database (if not exists)
        run: |
          echo "Checking D1 database..."
          wrangler d1 list --json | grep -q "emby-proxy-db" || wrangler d1 create emby-proxy-db
